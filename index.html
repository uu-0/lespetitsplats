<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Les Petits Plats</title>
    <!--bootstrap-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">    <!--fontawesom-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!--googlefont-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Manrope:wght@300&display=swap" rel="stylesheet">
    <!--css-->
    <link href="assets/css/style.css" rel="stylesheet">
    <link rel="icon" type="image/png" href="assets/ressources/icon.png">
</head>
<body>
    <header class="text-center">
        <img class="header-logo" src="assets/ressources/logo.png" alt="logo Les Petits Plats" />
        <div class="header-informations">
            <h1>
                CHERCHEZ PARMI PLUS DE 1500 RECETTES DU QUOTIDIEN, SIMPLES ET DÉLICIEUSES
            </h1>
            <div class="search-bar">
                <input type="search" class="search-input" placeholder="Rechercher une recette, un ingrédient..." aria-label="Rechercher une recette" aria-describedby="Rechercher une recette" />
                <button type="button" class="btn btn-dark search-btn" data-mdb-ripple-init>
                    <i class="fa-solid fa-magnifying-glass fa-2xl"></i>
                </button>
            </div>
        </div>
    </header>
    <main class="container-fluid">
        <div class="bloc-total-recettes">- recettes</div>
        <div class="search-options-container">
            <select class="form-select" aria-label="sélection d'un ingrédient">
                <option selected hidden>Ingrédients</option>
                <option value="1">nom ingrédient</option>
            </select>
            <select class="form-select" aria-label="sélection d'un appareil">
                <option  selected hidden>Appareils</option>
                <option value="1">nom appareil</option>
            </select>
            <select class="form-select" aria-label="sélection d'un ustensible">
                <option selected hidden>Ustensiles</option>
                <option value="1">nom ustensible</option>
            </select>
        </div>
        <div class="cards-container row row-cols-1 row-cols-md-3 g-4">
            <div class="col">
                <div class="card"> 
                    <img src="assets/ressources/recette01.png"
                         class="card-img-top"
                         alt="img"> 
                    <div class="card-time">min</div>
                    <div class="card-body"> 
                        <h2> 
                            card tilte
                        </h2> 
                        <b>RECETTE</b>
                        <p> 
                            préparation...
                        </p> 
                        <b>INGRÉDIENTS</b>
                        <div class="card-ingredients-groupe">
                            <div class="card-ingredient">
                                <p>nom ingrédient</p>
                                <span>quantité</span>
                            </div>
                        </div>
                    </div> 
                </div> 
            </div>
        </div>
    </main> 
    <script src="js/script.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
</body>
</html>
